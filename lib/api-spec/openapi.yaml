openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: WhatsApp Store Builder API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: stores
    description: Store management
  - name: products
    description: Product management
  - name: orders
    description: Order management
  - name: ai
    description: AI-powered features
  - name: analytics
    description: Store analytics and reporting
  - name: billing
    description: Subscription and billing management
  - name: referral
    description: Referral program
  - name: admin
    description: Admin panel
  - name: growth
    description: Growth and sharing tools

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # Store endpoints
  /stores/me:
    get:
      operationId: getMyStore
      tags: [stores]
      summary: Get the authenticated user's store
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Store details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Store"
        "404":
          description: No store found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateMyStore
      tags: [stores]
      summary: Update the authenticated user's store
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateStoreBody"
      responses:
        "200":
          description: Updated store
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Store"

  /stores/me/slug:
    patch:
      operationId: updateMyStoreSlug
      tags: [stores]
      summary: Change the authenticated user's store slug (URL handle)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateStoreSlugBody"
      responses:
        "200":
          description: Updated store with new slug
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Store"
        "409":
          description: Slug already taken
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /stores/me/temporarily-closed:
    patch:
      operationId: updateMyStoreTempClosed
      tags: [stores]
      summary: Toggle the temporarily closed flag
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                closed:
                  type: boolean
                message:
                  type: string
                  nullable: true
                  description: Optional message shown to customers.
              required: [closed]
      responses:
        "200":
          description: Updated store
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Store"

  /stores/me/holidays:
    patch:
      operationId: updateMyStoreHolidays
      tags: [stores]
      summary: Update holiday closure dates
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                dates:
                  type: array
                  items:
                    type: string
                  description: List of YYYY-MM-DD dates the store will be closed.
              required: [dates]
      responses:
        "200":
          description: Updated store
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Store"

  /stores/me/hours:
    patch:
      operationId: updateMyStoreHours
      tags: [stores]
      summary: Update store opening hours
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StoreHoursMap"
      responses:
        "200":
          description: Updated store
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Store"

  /stores/me/domain:
    patch:
      operationId: updateMyStoreDomain
      tags: [stores]
      summary: Set or clear a custom domain for the authenticated user's store
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateStoreDomainBody"
      responses:
        "200":
          description: Updated store
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Store"

  /stores/me/domain-status:
    get:
      operationId: getMyStoreDomainStatus
      tags: [stores]
      summary: Check DNS status of the custom domain for the authenticated user's store
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Domain DNS status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DomainStatusResult"

  /stores/slug-check:
    get:
      operationId: checkSlugAvailability
      tags: [stores]
      summary: Check if a store slug is available (auth required)
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: slug
          required: true
          schema:
            type: string
          description: The slug to check for availability
      responses:
        "200":
          description: Availability result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SlugCheckResult"

  /stores:
    post:
      operationId: createStore
      tags: [stores]
      summary: Create a new store for the authenticated user
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateStoreBody"
      responses:
        "201":
          description: Created store
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Store"

  /stores/browse:
    get:
      operationId: browseStores
      tags: [stores]
      summary: Browse and search all public stores (no auth)
      parameters:
        - in: query
          name: q
          schema:
            type: string
          description: Optional search query (name, slug, description)
        - in: query
          name: category
          schema:
            type: string
          description: Filter by store category
        - in: query
          name: page
          schema:
            type: integer
            default: 1
          description: Page number (1-indexed)
      responses:
        "200":
          description: Paginated store list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BrowseStoresResult"

  /stores/top:
    get:
      operationId: getTopStores
      tags: [stores]
      summary: Get top stores by order volume (public, no auth)
      responses:
        "200":
          description: List of top stores
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TopStore"

  /stores/public/{slug}:
    get:
      operationId: getPublicStore
      tags: [stores]
      summary: Get a public store by slug (no auth required)
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Public store data with products
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicStore"
        "404":
          description: Store not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /coupons/validate:
    post:
      operationId: validateCoupon
      tags: [coupons]
      summary: Validate a coupon code for a store (public, no auth)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ValidateCouponBody"
      responses:
        "200":
          description: Validation result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidateCouponResponse"

  /coupons:
    get:
      operationId: listCoupons
      tags: [coupons]
      summary: List all coupons for the authenticated store
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of coupons
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Coupon"
    post:
      operationId: createCoupon
      tags: [coupons]
      summary: Create a new coupon
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCouponBody"
      responses:
        "201":
          description: Created coupon
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Coupon"

  /coupons/{id}:
    put:
      operationId: updateCoupon
      tags: [coupons]
      summary: Update a coupon
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCouponBody"
      responses:
        "200":
          description: Updated coupon
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Coupon"
    delete:
      operationId: deleteCoupon
      tags: [coupons]
      summary: Delete a coupon
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /stores/public/{slug}/waitlist:
    post:
      operationId: joinWaitlist
      tags: [stores]
      summary: Sign up for back-in-stock alert (public, no auth required)
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JoinWaitlistBody"
      responses:
        "201":
          description: Successfully joined waitlist
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JoinWaitlistResponse"
        "409":
          description: Already on the waitlist
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Store or product not found

  /products/import:
    post:
      operationId: importProducts
      tags: [products]
      summary: Bulk import products from CSV text
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ImportProductsBody"
      responses:
        "200":
          description: Import results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportProductsResponse"

  /products/waitlist:
    get:
      operationId: listWaitlistEntries
      tags: [products]
      summary: List all unnotified waitlist entries for the authenticated store
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Waitlist entries with product info
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WaitlistEntryWithProduct"

  /products/{id}/waitlist/notify:
    post:
      operationId: notifyWaitlist
      tags: [products]
      summary: Send back-in-stock emails to all unnotified waitlist entries for a product
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Number of customers notified
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotifyWaitlistResponse"
        "404":
          description: Product not found

  /products/waitlist-counts:
    get:
      operationId: getWaitlistCounts
      tags: [products]
      summary: Get waitlist signup counts per product for the authenticated store
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Map of productId to waitlist count
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WaitlistCountsResponse"

  # Product endpoints
  /products:
    get:
      operationId: listProducts
      tags: [products]
      summary: List all products for the authenticated user's store
      security:
        - bearerAuth: []
      parameters:
        - name: category
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
        - name: inStock
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: List of products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"
    post:
      operationId: createProduct
      tags: [products]
      summary: Create a new product
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProductBody"
      responses:
        "201":
          description: Created product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "403":
          description: Plan limit reached
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LimitReachedError"

  /products/{id}:
    get:
      operationId: getProduct
      tags: [products]
      summary: Get a product by ID
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Product details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
    put:
      operationId: updateProduct
      tags: [products]
      summary: Update a product
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProductBody"
      responses:
        "200":
          description: Updated product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
    delete:
      operationId: deleteProduct
      tags: [products]
      summary: Delete a product
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /products/categories:
    get:
      operationId: listCategories
      tags: [products]
      summary: List all product categories for the store
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of categories
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string

  # Order endpoints
  /orders:
    get:
      operationId: listOrders
      tags: [orders]
      summary: List orders for the store
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, confirmed, completed, cancelled]
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: List of orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"
    post:
      operationId: createOrder
      tags: [orders]
      summary: Create a new order (from public storefront)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOrderBody"
      responses:
        "201":
          description: Created order with WhatsApp link
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderWithWhatsApp"

  /orders/track/{token}:
    get:
      operationId: trackOrder
      tags: [orders]
      summary: Track an order by its tracking token (public, no auth)
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Order tracking info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderTrackingInfo"
        "404":
          description: Order not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /orders/{id}:
    get:
      operationId: getOrder
      tags: [orders]
      summary: Get order by ID
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Order details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
    patch:
      operationId: updateOrderStatus
      tags: [orders]
      summary: Update order status
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateOrderStatusBody"
      responses:
        "200":
          description: Updated order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  # AI endpoints
  /ai/generate-store:
    post:
      operationId: generateStore
      tags: [ai]
      summary: AI-generate a store from a business description
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateStoreBody"
      responses:
        "200":
          description: AI-generated store suggestion
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GeneratedStore"

  /ai/generate-description:
    post:
      operationId: generateProductDescription
      tags: [ai]
      summary: AI-generate a product description
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateDescriptionBody"
      responses:
        "200":
          description: AI-generated description
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenerateDescriptionResponse"

  /ai/suggest-price:
    post:
      operationId: suggestProductPrice
      tags: [ai]
      summary: AI-suggest a price for a product
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SuggestPriceBody"
      responses:
        "200":
          description: AI price suggestion
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuggestPriceResponse"

  # Analytics endpoints
  /analytics/summary:
    get:
      operationId: getAnalyticsSummary
      tags: [analytics]
      summary: Get store analytics summary
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Analytics summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalyticsSummary"

  /analytics/recent-orders:
    get:
      operationId: getRecentOrders
      tags: [analytics]
      summary: Get recent orders for dashboard
      security:
        - bearerAuth: []
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
      responses:
        "200":
          description: Recent orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"

  /analytics/top-products:
    get:
      operationId: getTopProducts
      tags: [analytics]
      summary: Get best-performing products
      security:
        - bearerAuth: []
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 5
      responses:
        "200":
          description: Top products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProductWithStats"

  /analytics/orders-per-day:
    get:
      operationId: getOrdersPerDay
      tags: [analytics]
      summary: Get orders and revenue per day (last 30 days)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Orders per day
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OrdersPerDayItem"

  # Billing endpoints
  /billing/plans:
    get:
      operationId: getBillingPlans
      tags: [billing]
      summary: Get all available plans
      responses:
        "200":
          description: List of plans
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Plan"

  /billing/status:
    get:
      operationId: getBillingStatus
      tags: [billing]
      summary: Get the current user's billing status
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Billing status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BillingStatus"

  /billing/checkout:
    post:
      operationId: createCheckoutSession
      tags: [billing]
      summary: Create a Stripe checkout session
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCheckoutBody"
      responses:
        "200":
          description: Checkout session URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckoutSession"

  /billing/portal:
    post:
      operationId: createBillingPortal
      tags: [billing]
      summary: Create a Stripe customer portal session
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Portal session URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckoutSession"

  /billing/webhook:
    post:
      operationId: handleBillingWebhook
      tags: [billing]
      summary: Stripe webhook handler
      responses:
        "200":
          description: Webhook processed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # Referral endpoints
  /referral/preview/{code}:
    get:
      operationId: getReferralPreview
      tags: [referral]
      summary: Get public referral preview info by code (no auth required)
      parameters:
        - in: path
          name: code
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Referral preview
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReferralPreview"
        "404":
          description: Not found

  /referral/me:
    get:
      operationId: getMyReferral
      tags: [referral]
      summary: Get the current user's referral info
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Referral info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReferralInfo"

  /referral/apply:
    post:
      operationId: applyReferralCode
      tags: [referral]
      summary: Apply a referral code
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApplyReferralBody"
      responses:
        "200":
          description: Referral applied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReferralInfo"

  # Admin endpoints
  /admin/stats:
    get:
      operationId: getAdminStats
      tags: [admin]
      summary: Get platform-wide admin stats
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Admin stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStats"

  /admin/users:
    get:
      operationId: getAdminUsers
      tags: [admin]
      summary: Get all users with their stores and plans
      security:
        - bearerAuth: []
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: List of admin users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminUser"

  /admin/users/{userId}/plan:
    patch:
      operationId: changeUserPlan
      tags: [admin]
      summary: Change a user's plan
      security:
        - bearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangeUserPlanBody"
      responses:
        "200":
          description: Updated subscription
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUser"

  # Growth endpoints
  /growth/share-message:
    get:
      operationId: getShareMessage
      tags: [growth]
      summary: Get WhatsApp share message for the store
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Share message
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ShareMessage"

  /growth/qr-code:
    get:
      operationId: getQrCode
      tags: [growth]
      summary: Get QR code PNG for the store URL
      security:
        - bearerAuth: []
      responses:
        "200":
          description: QR code image
          content:
            image/png:
              schema:
                type: string
                format: binary

  /reviews:
    post:
      operationId: submitReview
      tags: [reviews]
      summary: "Submit a product review using an order tracking token"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateReviewBody"
      responses:
        "201":
          description: Review created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Review"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Already reviewed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /stores/{slug}/reviews:
    get:
      operationId: getStoreReviews
      tags: [reviews]
      summary: "Get all reviews for a store's products (public)"
      parameters:
        - in: path
          name: slug
          required: true
          schema:
            type: string
        - in: query
          name: productId
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: List of reviews
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Review"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    Coupon:
      type: object
      properties:
        id:
          type: integer
        storeId:
          type: integer
        code:
          type: string
        type:
          type: string
          enum: [percentage, fixed]
        value:
          type: number
        minOrderAmount:
          type: number
          nullable: true
        maxUses:
          type: integer
          nullable: true
        usedCount:
          type: integer
        expiresAt:
          type: string
          format: date-time
          nullable: true
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time
      required: [id, storeId, code, type, value, usedCount, isActive, createdAt]

    CreateCouponBody:
      type: object
      properties:
        code:
          type: string
        type:
          type: string
          enum: [percentage, fixed]
        value:
          type: number
        minOrderAmount:
          type: number
          nullable: true
        maxUses:
          type: integer
          nullable: true
        expiresAt:
          type: string
          format: date-time
          nullable: true
        isActive:
          type: boolean
      required: [code, type, value]

    UpdateCouponBody:
      type: object
      properties:
        code:
          type: string
        type:
          type: string
          enum: [percentage, fixed]
        value:
          type: number
        minOrderAmount:
          type: number
          nullable: true
        maxUses:
          type: integer
          nullable: true
        expiresAt:
          type: string
          format: date-time
          nullable: true
        isActive:
          type: boolean

    ValidateCouponBody:
      type: object
      properties:
        storeId:
          type: integer
        code:
          type: string
        orderAmount:
          type: number
      required: [storeId, code, orderAmount]

    ValidateCouponResponse:
      type: object
      properties:
        valid:
          type: boolean
        couponId:
          type: integer
        discountType:
          type: string
          enum: [percentage, fixed]
        discountValue:
          type: number
        discountAmount:
          type: number
        finalAmount:
          type: number
        error:
          type: string
      required: [valid]

    Review:
      type: object
      properties:
        id:
          type: integer
        storeId:
          type: integer
        orderId:
          type: integer
        productId:
          type: integer
        customerName:
          type: string
          nullable: true
        rating:
          type: integer
          minimum: 1
          maximum: 5
        comment:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
      required: [id, storeId, orderId, productId, rating, createdAt]

    CreateReviewBody:
      type: object
      properties:
        trackingToken:
          type: string
        productId:
          type: integer
        rating:
          type: integer
          minimum: 1
          maximum: 5
        comment:
          type: string
          nullable: true
      required: [trackingToken, productId, rating]

    ImportProductsBody:
      type: object
      properties:
        csv:
          type: string
      required: [csv]

    ImportProductsResponse:
      type: object
      properties:
        imported:
          type: integer
