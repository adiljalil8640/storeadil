          nullable: true
      required: [productId, email]

    JoinWaitlistResponse:
      type: object
      properties:
        message:
          type: string
      required: [message]

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required: [error]

    LimitReachedError:
      type: object
