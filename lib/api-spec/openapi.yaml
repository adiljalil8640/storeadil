openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: WhatsApp Store Builder API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: stores
    description: Store management
  - name: products
    description: Product management
  - name: orders
    description: Order management
  - name: ai
    description: AI-powered features
  - name: analytics
    description: Store analytics and reporting

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # Store endpoints
  /stores/me:
    get:
      operationId: getMyStore
      tags: [stores]
      summary: Get the authenticated user's store
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Store details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Store"
        "404":
          description: No store found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateMyStore
      tags: [stores]
      summary: Update the authenticated user's store
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateStoreBody"
      responses:
        "200":
          description: Updated store
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Store"

  /stores:
    post:
      operationId: createStore
      tags: [stores]
      summary: Create a new store for the authenticated user
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateStoreBody"
      responses:
        "201":
          description: Created store
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Store"

  /stores/public/{slug}:
    get:
      operationId: getPublicStore
      tags: [stores]
      summary: Get a public store by slug (no auth required)
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Public store data with products
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicStore"
        "404":
          description: Store not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # Product endpoints
  /products:
    get:
      operationId: listProducts
      tags: [products]
      summary: List all products for the authenticated user's store
      security:
        - bearerAuth: []
      parameters:
        - name: category
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
        - name: inStock
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: List of products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"
    post:
      operationId: createProduct
      tags: [products]
      summary: Create a new product
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProductBody"
      responses:
        "201":
          description: Created product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"

  /products/{id}:
    get:
      operationId: getProduct
      tags: [products]
      summary: Get a product by ID
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Product details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
    put:
      operationId: updateProduct
      tags: [products]
      summary: Update a product
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProductBody"
      responses:
        "200":
          description: Updated product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
    delete:
      operationId: deleteProduct
      tags: [products]
      summary: Delete a product
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /products/categories:
    get:
      operationId: listCategories
      tags: [products]
      summary: List all product categories for the store
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of categories
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string

  # Order endpoints
  /orders:
    get:
      operationId: listOrders
      tags: [orders]
      summary: List orders for the store
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, confirmed, completed, cancelled]
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: List of orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"
    post:
      operationId: createOrder
      tags: [orders]
      summary: Create a new order (from public storefront)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOrderBody"
      responses:
        "201":
          description: Created order with WhatsApp link
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderWithWhatsApp"

  /orders/{id}:
    get:
      operationId: getOrder
      tags: [orders]
      summary: Get order by ID
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Order details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
    patch:
      operationId: updateOrderStatus
      tags: [orders]
      summary: Update order status
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateOrderStatusBody"
      responses:
        "200":
          description: Updated order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  # AI endpoint
  /ai/generate-store:
    post:
      operationId: generateStore
      tags: [ai]
      summary: AI-generate a store from a business description
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateStoreBody"
      responses:
        "200":
          description: AI-generated store suggestion
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GeneratedStore"

  # Analytics endpoints
  /analytics/summary:
    get:
      operationId: getAnalyticsSummary
      tags: [analytics]
      summary: Get store analytics summary (revenue, orders, top products)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Analytics summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalyticsSummary"

  /analytics/recent-orders:
    get:
      operationId: getRecentOrders
      tags: [analytics]
      summary: Get recent orders for dashboard activity feed
      security:
        - bearerAuth: []
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
      responses:
        "200":
          description: Recent orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"

  /analytics/top-products:
    get:
      operationId: getTopProducts
      tags: [analytics]
      summary: Get best-performing products by order count
      security:
        - bearerAuth: []
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 5
      responses:
        "200":
          description: Top products with order counts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProductWithStats"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required: [error]

    Store:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: string
        name:
          type: string
        slug:
          type: string
        description:
          type: string
          nullable: true
        whatsappNumber:
          type: string
          nullable: true
        currency:
          type: string
        logoUrl:
          type: string
          nullable: true
        theme:
          type: string
          enum: [light, dark, minimal]
        deliveryEnabled:
          type: boolean
        pickupEnabled:
          type: boolean
        shippingNote:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - userId
        - name
        - slug
        - currency
        - theme
        - deliveryEnabled
        - pickupEnabled
        - createdAt
        - updatedAt

    PublicStore:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        slug:
          type: string
        description:
          type: string
          nullable: true
        whatsappNumber:
          type: string
          nullable: true
        currency:
          type: string
        logoUrl:
          type: string
          nullable: true
        theme:
          type: string
        deliveryEnabled:
          type: boolean
        pickupEnabled:
          type: boolean
        shippingNote:
          type: string
          nullable: true
        products:
          type: array
          items:
            $ref: "#/components/schemas/Product"
      required:
        - id
        - name
        - slug
        - currency
        - theme
        - deliveryEnabled
        - pickupEnabled
        - products

    CreateStoreBody:
      type: object
      properties:
        name:
          type: string
        slug:
          type: string
        description:
          type: string
          nullable: true
        whatsappNumber:
          type: string
          nullable: true
        currency:
          type: string
          default: USD
        theme:
          type: string
          enum: [light, dark, minimal]
          default: light
        deliveryEnabled:
          type: boolean
          default: true
        pickupEnabled:
          type: boolean
          default: false
        shippingNote:
          type: string
          nullable: true
      required: [name, slug]

    UpdateStoreBody:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
          nullable: true
        whatsappNumber:
          type: string
          nullable: true
        currency:
          type: string
        logoUrl:
          type: string
          nullable: true
        theme:
          type: string
          enum: [light, dark, minimal]
        deliveryEnabled:
          type: boolean
        pickupEnabled:
          type: boolean
        shippingNote:
          type: string
          nullable: true

    Product:
      type: object
      properties:
        id:
          type: integer
        storeId:
          type: integer
        name:
          type: string
        description:
          type: string
          nullable: true
        price:
          type: number
        imageUrl:
          type: string
          nullable: true
        category:
          type: string
          nullable: true
        stock:
          type: integer
          nullable: true
        variants:
          type: array
          items:
            $ref: "#/components/schemas/ProductVariant"
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - storeId
        - name
        - price
        - isActive
        - variants
        - createdAt

    ProductVariant:
      type: object
      properties:
        name:
          type: string
        options:
          type: array
          items:
            type: string
      required: [name, options]

    CreateProductBody:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
          nullable: true
        price:
          type: number
        imageUrl:
          type: string
          nullable: true
        category:
          type: string
          nullable: true
        stock:
          type: integer
          nullable: true
        variants:
          type: array
          items:
            $ref: "#/components/schemas/ProductVariant"
        isActive:
          type: boolean
          default: true
      required: [name, price]

    UpdateProductBody:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
          nullable: true
        price:
          type: number
        imageUrl:
          type: string
          nullable: true
        category:
          type: string
          nullable: true
        stock:
          type: integer
          nullable: true
        variants:
          type: array
          items:
            $ref: "#/components/schemas/ProductVariant"
        isActive:
          type: boolean

    ProductWithStats:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        price:
          type: number
        imageUrl:
          type: string
          nullable: true
        category:
          type: string
          nullable: true
        orderCount:
          type: integer
        totalRevenue:
          type: number
      required: [id, name, price, orderCount, totalRevenue]

    OrderItem:
      type: object
      properties:
        productId:
          type: integer
        productName:
          type: string
        quantity:
          type: integer
        price:
          type: number
        selectedVariants:
          type: object
          additionalProperties:
            type: string
      required: [productId, productName, quantity, price]

    Order:
      type: object
      properties:
        id:
          type: integer
        storeId:
          type: integer
        customerName:
          type: string
          nullable: true
        customerPhone:
          type: string
          nullable: true
        customerNote:
          type: string
          nullable: true
        items:
          type: array
          items:
            $ref: "#/components/schemas/OrderItem"
        total:
          type: number
        status:
          type: string
          enum: [pending, confirmed, completed, cancelled]
        deliveryType:
          type: string
          enum: [delivery, pickup]
          nullable: true
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - storeId
        - items
        - total
        - status
        - createdAt

    CreateOrderBody:
      type: object
      properties:
        storeId:
          type: integer
        customerName:
          type: string
          nullable: true
        customerPhone:
          type: string
          nullable: true
        customerNote:
          type: string
          nullable: true
        items:
          type: array
          items:
            $ref: "#/components/schemas/OrderItem"
        deliveryType:
          type: string
          enum: [delivery, pickup]
          nullable: true
      required: [storeId, items]

    OrderWithWhatsApp:
      type: object
      properties:
        order:
          $ref: "#/components/schemas/Order"
        whatsappUrl:
          type: string
      required: [order, whatsappUrl]

    UpdateOrderStatusBody:
      type: object
      properties:
        status:
          type: string
          enum: [pending, confirmed, completed, cancelled]
      required: [status]

    GenerateStoreBody:
      type: object
      properties:
        description:
          type: string
      required: [description]

    GeneratedStore:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        categories:
          type: array
          items:
            type: string
        products:
          type: array
          items:
            $ref: "#/components/schemas/CreateProductBody"
        whatsappNumber:
          type: string
          nullable: true
      required: [name, description, categories, products]

    AnalyticsSummary:
      type: object
      properties:
        totalRevenue:
          type: number
        totalOrders:
          type: integer
        pendingOrders:
          type: integer
        completedOrders:
          type: integer
        totalProducts:
          type: integer
        activeProducts:
          type: integer
        revenueThisMonth:
          type: number
        ordersThisMonth:
          type: integer
      required:
        - totalRevenue
        - totalOrders
        - pendingOrders
        - completedOrders
        - totalProducts
        - activeProducts
        - revenueThisMonth
        - ordersThisMonth
