        limit:
          type: integer
        current:
          type: integer
        planName:
          type: string
      required: [error, code, limit, current, planName]

    Store:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: string
        name:
          type: string
        slug:
          type: string
        description:
          type: string
          nullable: true
        whatsappNumber:
          type: string
          nullable: true
        currency:
          type: string
        logoUrl:
          type: string
          nullable: true
        theme:
          type: string
          enum: [light, dark, minimal]
        deliveryEnabled:
          type: boolean
        pickupEnabled:
          type: boolean
        shippingNote:
          type: string
          nullable: true
        notificationEmail:
          type: string
          nullable: true
        digestFrequency:
          type: string
          enum: [none, daily, weekly]
          nullable: true
        category:
          type: string
          nullable: true
        metaTitle:
          type: string
          nullable: true
          description: Custom SEO/OG title shown to search engines and social platforms. Falls back to store name if not set.
        metaDescription:
          type: string
          nullable: true
          description: Custom SEO/OG description for link previews and search results. Falls back to store description if not set.
        customDomain:
          type: string
          nullable: true
          description: Custom domain pointing to this store (e.g. shop.mybrand.com).
        storeHours:
          $ref: '#/components/schemas/StoreHoursMap'
          nullable: true
          description: Per-day opening hours. Null means hours are not configured.
        holidayClosures:
          type: array
          items:
            type: string
          nullable: true
          description: List of YYYY-MM-DD dates on which the store is closed regardless of regular hours.
        temporarilyClosed:
          type: boolean
          description: When true the store is instantly closed regardless of hours or holiday settings.
        temporaryClosedMessage:
          type: string
          nullable: true
          description: Optional message shown to customers when temporarily closed (e.g. "Back Monday at 9 AM").
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - userId
        - name
        - slug
        - currency
        - theme
        - deliveryEnabled
        - pickupEnabled
        - createdAt
        - updatedAt

    PublicStore:
