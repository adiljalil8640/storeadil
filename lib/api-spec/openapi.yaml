        id:
          type: integer
        productId:
          type: integer
        productName:
          type: string
        email:
          type: string
        name:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
      required: [id, productId, productName, email, createdAt]

    NotifyWaitlistResponse:
