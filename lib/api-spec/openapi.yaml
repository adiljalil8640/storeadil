openapi: 3.0.0
info:
  title: WhatsApp Message API
  version: 1.0.0
paths:
  /stores/me/whatsapp-messages:
    get:
      operationId: getWhatsappMessages
      tags: [whatsapp]
      summary: Get WhatsApp conversation history
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
      responses:
        '200':
          description: Message history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/WhatsappMessage'
components:
  schemas:
    WhatsappMessage:
      type: object
      properties:
        id: { type: integer }
        storeId: { type: integer }
        mode: { type: string }
        customerPhone: { type: string }
        customerMessage: { type: string }
        aiReply: { type: string }
        source: { type: string }
        createdAt: { type: string, format: date-time }
      required: [id, storeId, mode, customerPhone, customerMessage, aiReply, source, createdAt]
